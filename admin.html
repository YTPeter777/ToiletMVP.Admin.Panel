<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP 管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10">
    <div class="max-w-md mx-auto bg-slate-800 p-8 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold mb-6">系統管理</h1>
        <input type="text" id="user" placeholder="帳號" class="w-full p-3 mb-4 bg-slate-700 rounded-lg text-white">
        <input type="password" id="pass" placeholder="密碼" class="w-full p-3 mb-6 bg-slate-700 rounded-lg text-white">
        <button onclick="login()" class="w-full bg-blue-600 p-3 rounded-lg font-bold">進入</button>
    </div>

    <script>
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "Admin" && p === "990926") {
                alert("登入成功！");
                document.body.innerHTML = '<div class="max-w-md mx-auto bg-slate-800 p-8 rounded-2xl"><h1>進入後台成功</h1></div>';
            } else { alert("錯誤"); }
        }
    </script>
</body>
</html>
