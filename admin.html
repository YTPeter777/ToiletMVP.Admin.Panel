<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP 戰情室 | 管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { 
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%); 
            color: #f8fafc; 
            font-family: 'Noto Sans TC', sans-serif; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 毛玻璃質感卡片 */
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* 輸入框樣式 */
        .input-style {
            width: 100%;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 1rem;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-style:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }
    </style>
</head>
<body class="p-6 w-full">

    <div id="loginOverlay" class="w-full max-w-sm mx-auto glass p-10 rounded-[2.5rem] text-center transition-all duration-500">
        <div class="bg-sky-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-sky-500/20">
            <i class="fa-solid fa-shield-halved text-white text-2xl"></i>
        </div>
        <h2 class="text-2xl font-black mb-6 tracking-tighter">系統管理登入</h2>
        <div class="space-y-4">
            <input type="text" id="user" placeholder="管理員帳號" class="input-style">
            <input type="password" id="pass" placeholder="管理員密碼" class="input-style">
            <button onclick="handleLogin()" class="w-full bg-sky-600 py-4 rounded-xl font-black text-white hover:bg-sky-500 active:scale-95 transition-all shadow-lg shadow-sky-600/20 mt-2">
                進入戰情室
            </button>
        </div>
    </div>

    <div id="adminPanel" class="w-full max-w-2xl mx-auto hidden transition-all duration-500">
        <header class="flex justify-between items-center mb-10 px-2">
            <div>
                <h1 class="text-3xl font-black tracking-tighter">MVP <span class="text-sky-400">戰情室</span></h1>
                <p class="text-slate-500 text-sm font-bold uppercase tracking-widest mt-1">Management Command Center</p>
            </div>
            <button onclick="location.reload()" class="text-slate-500 hover:text-white transition-all text-sm font-bold bg-white/5 px-4 py-2 rounded-lg">登出系統</button>
        </header>

        <div class="glass p-8 md:p-10 rounded-[2.5rem]">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">即時公告發布系統</span>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-black text-slate-500 mb-2 uppercase ml-1">公告標題</label>
                    <input id="title" type="text" placeholder="例如：系統維修通知、最新功能上線" class="input-style">
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-500 mb-2 uppercase ml-1">詳細內容</label>
                    <textarea id="content" rows="5" placeholder="請輸入要顯示在官網彈窗的詳細文字..." class="input-style resize-none"></textarea>
                </div>

                <button onclick="submitNotice()" id="sendBtn" class="w-full bg-sky-600 py-5 rounded-2xl font-black text-white hover:bg-sky-500 active:scale-95 transition-all shadow-xl shadow-sky-600/20 flex items-center justify-center gap-3 mt-4">
                    <i class="fa-solid fa-paper-plane"></i> 立即同步至官網
                </button>
            </div>
        </div>

        <footer class="mt-8 text-center">
            <p class="text-[10px] text-slate-600 font-bold tracking-widest uppercase">© 2026 Toilet MVP Operation System</p>
        </footer>
    </div>

    <script>
        // --- 1. 帳號密碼驗證邏輯 ---
        function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            // 你的專屬帳號密碼
            if(u === "Admin" && p === "990926") {
                // 隱藏登入框，顯示管理面板
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
            } else {
                alert("驗證失敗，請檢查帳號密碼。");
            }
        }

        // --- 2. 發布公告至 Google 表單 ---
        async function submitNotice() {
            const t = document.getElementById('title').value;
            const c = document.getElementById('content').value;
            const btn = document.getElementById('sendBtn');

            // 檢查是否漏填
            if(!t || !c) {
                alert("請填寫完整標題與內容！");
                return;
            }

            // 按鈕顯示傳送中，避免重複點擊
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> 資料同步中...';

            // 你的 Google 表單 Action URL 與欄位 ID
            const url = "https://docs.google.com/forms/d/e/1FAIpQLSd8T56O45h0Yt1H0n-Dq-lW4qD9hC5j4fQp_B6QJ9Vw6u3s-Q/formResponse";
            const data = new FormData();
            data.append("entry.1802956277", t); // 標題欄位
            data.append("entry.1506456073", c); // 內容欄位

            try {
                // 發送資料至 Google 表單 (使用 no-cors 模式繞過跨域限制)
                await fetch(url, { method: 'POST', body: data, mode: 'no-cors' });
                alert("✅ 公告已成功發布！官網將在 30 秒內自動更新。");
                
                // 清空輸入框
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
            } catch (e) {
                alert("發布失敗，請確認網路連線是否正常。");
            } finally {
                // 恢復按鈕狀態
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> 立即同步至官網';
            }
        }
    </script>
</body>
</html>
